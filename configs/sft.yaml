# configs/sft.yaml
# ─────────────────────────────────────────────────────────────────────────────
# DOCUMENTATION ONLY — not read by any script.
#
# All active settings live in:
#   src/edge_cloud_llm/config.py   (the single source of truth)
# ─────────────────────────────────────────────────────────────────────────────

# ── Kaggle / fast preset ──────────────────────────────────────────────────────
sft:
  base_checkpoint: "outputs/base/best.pt"
  output_dir:      "outputs/sft"

  curriculum_stages: [64, 64, 128, 128]
  use_context_packing: false

  use_lora:    true
  lora_rank:   4
  lora_alpha:  8.0
  lora_dropout: 0.05
  lora_target_modules: ["qkv"]
  merge_weights_after_training: true

  epochs:           2
  batch_size:       2
  grad_accum_steps: 1
  learning_rate:    2.0e-4
  weight_decay:     0.01
  warmup_steps:     10
  eval_batches:     5
  use_amp:          true

# NOTE: model architecture (n_embd, n_layer etc.) is shared with base training
# and lives under [model] in base.yaml / ModelConfig in config.py.
